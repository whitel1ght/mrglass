version: 2
before:
  hooks:
    - go mod tidy
builds:
  - main: ./cmd/mrglass
    binary: mrglass
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: "checksums.txt"
  algorithm: sha256
release:
  github:
    owner: dmitry
    name: mrglass
