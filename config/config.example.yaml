# mrglass configuration. All fields optional; shown values are the defaults.
days: 30
ticketRegex: '([A-Z][A-Z0-9]+-\d+)'
refreshMinutes: 5          # 0 disables auto-refresh
autoTriage: true
theme: tokyonight        # tokyonight | default | dracula

# Code host: gitlab (via glab) or github (via gh). The matching CLI must be
# installed and authenticated.
forge: gitlab

# Instruction for the on-demand Claude MR review (the `c` hotkey). The MR diff is
# appended automatically. Claude runs read-only; the generated review is shown for
# your confirmation before it's posted to the MR as a comment.
reviewPrompt: >
  You are reviewing a GitLab merge request. Given the diff below, write concise,
  actionable review feedback as a Markdown comment. Group findings by severity
  (Critical / Important / Minor). If it looks good, say so briefly. No preamble.

# Optionally drive the review with a Claude skill (invoked via the Skill tool).
# mrglass verifies the skill actually ran and shows "skill: <name> ✓" in the
# confirm prompt (or "⚠ skill not invoked" if it didn't). Skills may dispatch
# subagents, so this is slower/heavier than a plain prompt review. Empty = no skill.
#
# An installed plugin skill (e.g. superpowers):
# reviewSkill: superpowers:requesting-code-review
#
# OR a skill from a local checkout loaded just for this run via pluginDirs (no
# change to your global ~/.claude). The skill is namespaced by the dir name:
# reviewSkill: claude-components:mr-review
# pluginDirs:
#   - ~/projects/claude-components

# Local project context for reviews (optional but recommended). When projectsDir
# is set, the `c` review finds your local clone of the MR's repo, checks out the
# MR branch in a THROWAWAY git worktree (your working copy is never touched — no
# stash, no branch switch), and runs Claude there. Claude then sees the repo's
# CLAUDE.md, .claude/skills, and all files — a real project-aware review instead
# of diff-only. If no clone is found, it falls back to diff-only automatically.
projectsDir: ~/projects
# Per-project overrides for odd layouts/names (key = MR's "group/repo"):
# projectPaths:
#   acme/web: ~/work/dashboard

# Press w on a selected MR to open its branch in a terminal, ready to work on it.
# mrglass checks the MR branch out in a dedicated, persistent git worktree (your
# main clone is untouched) under <clone>/../.mrglass-worktrees/, then runs
# openCommand. Placeholders mrglass fills: {dir} (worktree path), {cmd} (workCmd
# below), {branch}, {key}. Empty openCommand disables w. Examples:
#   tmux new window:    tmux new-window -t {session}: -c {dir} {cmd}
#   tmux new session:   tmux new-session -d -s {key} -c {dir} {cmd}
#   iTerm2 new tab:     osascript -e 'tell application "iTerm2" to tell current window to create tab with default profile command "cd {dir} && {cmd}"'
#   macOS Terminal:     osascript -e 'tell application "Terminal" to do script "cd {dir} && {cmd}"'
#   kitty:              kitty @ launch --type=tab --cwd {dir} {cmd}
#   wezterm:            wezterm cli spawn --cwd {dir} -- {cmd}
worktree:
  openCommand: ""        # empty disables w
  workCmd: "claude"      # what to run in the worktree ({cmd})
  # dir: ""              # optional: override where worktrees are created

# Issue tracker (works with ANY tracker for open-in-browser).
tickets:
  # Press J on a selected MR to open its ticket. {key} is replaced with the key
  # (e.g. PROJ-1234). Works for any tracker — just set the right URL shape:
  #   Jira:   https://acme.atlassian.net/browse/{key}
  #   Linear: https://linear.app/acme/issue/{key}
  #   GitHub: https://github.com/acme/repo/issues/{key}
  urlTemplate: ""   # empty disables J

  # Inline ticket status when you expand an MR (enter). Jira only for now.
  status: none      # none | jira
  # For status: jira — the Jira site root, plus JIRA_EMAIL/JIRA_API_TOKEN in the
  # ENVIRONMENT (kept out of this file):
  #   export JIRA_EMAIL=you@company.com
  #   export JIRA_API_TOKEN=<token from id.atlassian.com/manage-profile/security/api-tokens>
  jiraBaseURL: ""   # e.g. https://acme.atlassian.net

sections:
  - title: "Needs My Review"
    filter: 'role == "review_requested" && !draft'
  - title: "Mine · Approved"
    filter: 'role == "mine" && len(approvedBy) > 0'
  - title: "Mine · Needs approval"
    filter: 'role == "mine" && len(approvedBy) == 0'

statusline:
  # Row-state style overrides. Supported keys:
  #   selected  — replaces the theme's cursor-row bar
  #   ci_failed — restyles the row's plain text (title etc.) when CI is failed
  states:
    selected:  { bg: "#2a2a40", bold: true }
    ci_failed: { fg: "#e06c75" }
  left:
    # Role (mine vs. to-review) is conveyed by the active tab, so there's no
    # per-row role marker by default. Add `- { type: marker }` to bring it back
    # (● = authored by you, ○ = assigned/review-requested).
    # grow: the segment fills the row's free width — expanding on wide
    # terminals, shrinking on narrow ones. maxWidth does not cap a grow
    # segment (it only limits plain, non-grow text segments).
    - { type: text, source: title, grow: true, maxWidth: 60 }
  right:
    - { type: ci, when: 'ci != ""',
        symbols: { success: "✓", failed: "✗", running: "🔄" } }
    # Glanceable approval mark: green ✓ when approved, dim ○ otherwise.
    # (Give it a format like "{approved}/{required}✓" to show the count instead.)
    - { type: approvals }
    - { type: comments, when: 'comments > 0', format: "💬{comments}" }
    - { type: advice, when: 'hasAdvice', text: "💡" }
    - { type: age, source: updatedAt, style: faint }
